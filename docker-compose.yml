services:
  # Redis service for Channels layer
  redis:
    image: redis:7-alpine
    container_name: tictactoe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - tictactoe-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Django application with Daphne
  web:
    build: .
    container_name: tictactoe-app
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 tic_tac_toe.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    environment:
      - DEBUG=True
      - SECRET_KEY=your-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - CHANNEL_LAYERS_BACKEND=channels_redis.core.RedisChannelLayer
      - CHANNEL_LAYERS_CONFIG_HOSTS=redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tictactoe-network
    stdin_open: true
    tty: true

volumes:
  redis_data:
    driver: local
  static_volume:
    driver: local

networks:
  tictactoe-network:
    driver: bridge
