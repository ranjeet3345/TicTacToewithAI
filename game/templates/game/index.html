{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe with AI</title>
    <link rel="stylesheet" href="{% static 'game/css/style.css' %}">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1 class="title">Tic-Tac-Toe</h1>
            <p class="subtitle">Real-Time Multiplayer &amp; AI</p>
        </header>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <div class="card-grid">
            <!-- Create a New Game -->
            <div class="card">
                <h2>Create Game</h2>
                <form method="post" action="{% url 'create_room' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="game_mode">Game Mode</label>
                        <select name="game_mode" id="game_mode" class="select-input">
                            <option value="multiplayer">Multiplayer (2 Players)</option>
                            <option value="ai_minimax">AI — Minimax (Unbeatable)</option>
                            <option value="ai_gemini">AI — Gemini (Human-like)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Room</button>
                </form>
            </div>

            <!-- Join an Existing Game -->
            <div class="card">
                <h2>Join Game</h2>
                <form method="post" action="{% url 'join_room' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="room_code">Room Code</label>
                        <input type="text" name="room_code" id="room_code"
                               placeholder="Enter 6-digit code" maxlength="6"
                               class="text-input" pattern="\d{6}" required>
                    </div>
                    <button type="submit" class="btn btn-secondary">Join Room</button>
                </form>
            </div>
        </div>

        <footer class="footer">
            <p>Built with Django, Django Channels, Redis &amp; WebSockets</p>
            <p class="credit">Ranjeet Yadav — Dronacharya College of Engineering</p>
        </footer>
    </div>
</body>
</html>
